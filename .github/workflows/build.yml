# 🎫 ticketlink-bot Build & Release CI
name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Check imports
        run: |
          cd src && python -c "
          from ticketlink_bot.config import load_config
          from ticketlink_bot.seats import find_seats_by_color, find_seats_in_zones
          from ticketlink_bot.bot import Bot, discover_cdp_url, _chrome_launch_help
          from ticketlink_bot.captcha import solve_captcha
          from ticketlink_bot.booking import full_auto_book, pick_coordinates
          from ticketlink_bot.__main__ import main
          print('✅ All imports OK')
          "
      - name: Syntax check
        run: python -m py_compile src/ticketlink_bot/*.py

  build-windows:
    name: Build Windows EXE
    needs: lint
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          python build/build_exe.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ticketlink-bot-windows
          path: dist/ticketlink-bot.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS binary
    needs: lint
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS binary
        run: python build/build_exe.py

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ticketlink-bot-macos
          path: dist/ticketlink-bot*
          if-no-files-found: error

  build-linux:
    name: Build Linux binary
    needs: lint
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux binary
        run: python build/build_exe.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ticketlink-bot-linux
          path: dist/ticketlink-bot*
          if-no-files-found: error

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ticketlink-bot-*
          merge-multiple: true
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ticketlink-bot ${{ github.ref_name }}
          body: |
            🎫 ticketlink-bot ${{ github.ref_name }}
            
            ## 설치 방법
            
            ### Windows
            1. `ticketlink-bot.exe` 다운로드 → 실행
            2. Chrome을 CDP 모드로 실행 필요
            
            ### macOS
            1. `ticketlink-bot-macos` 다운로드 → 실행 권한 부여
            2. `chmod +x ticketlink-bot && ./ticketlink-bot --pick`
            
            ### Linux
            1. `ticketlink-bot-linux` 다운로드 → 실행 권한 부여
            2. `chmod +x ./ticketlink-bot && ./ticketlink-bot --pick`
          files: release-artifacts/*
          draft: false
          prerelease: false
